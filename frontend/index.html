<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat UI</title>
    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="chat-wrapper">
            <!-- Header -->
            <header class="chat-header">
                <div class="header-info">
                    <div class="avatar">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=AI" alt="AI Avatar">
                    </div>
                    <div class="header-text">
                        <h1>AI Assistant</h1>
                        <span class="status">Online</span>
                    </div>
                </div>
                <button class="icon-button" aria-label="Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-more-vertical"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                </button>
            </header>

            <!-- Chat Messages -->
            <main class="chat-messages" id="chat-messages">
                <div class="message-wrapper assistant animate-in">
                    <div class="avatar">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=AI" alt="AI">
                    </div>
                    <div class="message-content">
                        Hello! I am your AI assistant. How can I help you today?
                    </div>
                </div>
            </main>

            <!-- Input Area -->
            <footer class="chat-footer">
                <form id="chat-form" class="chat-input-container">
                    <button type="button" class="icon-button attach-btn" aria-label="Attach File">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-paperclip"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </button>
                    <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off" required>
                    <button type="submit" class="submit-btn" id="send-btn" aria-label="Send Message" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    </button>
                </form>
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
